<!doctype html>
<html lang="fa-IR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/bootstrap.rtl.min.css" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      @font-face {
        font-family: "main";
        src: url("./assets/fonts/Vazirmatn-SemiBold.woff2") format("woff2");
      }
      @font-face {
        font-family: "bold";
        src: url("./assets/fonts/Vazirmatn-ExtraBold.woff2") format("woff2");
      }

      body {
        font-family: "main";
        direction: rtl;
      }

      header a {
        text-decoration: none;
        color: #63616a;
      }
      header h2:hover {
        color: #211f25;
        transition: 0.7s;
      }

      header {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 5px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 1px;
      }

      .logo img {
        width: 55px;
      }

      .logo h2 {
        margin: 0;
      }
      .input {
        border: none;
        padding: 0.7rem;
        width: 100%;
        border-radius: 1rem;
        background: #e8e8e8;
        box-shadow:
          20px 20px 60px #c5c5c5,
          -20px -20px 60px #ffffff;
        transition: 0.7s;
      }

      .input:focus {
        outline-color: #e8e8e8;
        background: #e8e8e8;
        box-shadow:
          inset 20px 20px 60px #c5c5c5,
          inset -20px -20px 60px #ffffff;
        transition: 0.3s;
      }
      #search {
        margin: 3% 7%;
      }
      #slider {
        margin: 25px 20px;
        border-radius: 24px;
        overflow: hidden;
      }
      #items {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
        justify-items: center;
        align-items: center;
        padding: 15px;
      }
      #items div {
        width: 40px;
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      }
      #items div:hover {
        width: 50px;
        height: 50px;
        background-color: #f7efef;
        transition: 0.3s;
      }

      #items img {
        width: 30px;
        height: 30px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="#" class="logo">
        <img src="./assets/img/main.webp" alt="Logo" />
        <h2 style="font-family: bold">گلابی</h2>
      </a>
    </header>
    <div id="search">
      <input
        type="text"
        name="text"
        class="input"
        placeholder="جستجو در محصولات ..."
      />
    </div>
    <div id="slider">
      <div
        id="carouselExampleFade"
        class="carousel slide carousel-fade"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner">
          <a href="#">
            <div class="carousel-item active">
              <img
                src="./assets/img/slider1.webp"
                class="d-block w-100"
                alt="slider"
              />
            </div>
          </a>
          <a href="#">
            <div class="carousel-item">
              <img
                src="./assets/img/slider2.webp"
                class="d-block w-100"
                alt="slider"
              />
            </div>
          </a>
          <a href="#">
            <div class="carousel-item">
              <img
                src="./assets/img/slider3.webp"
                class="d-block w-100"
                alt="slider"
              />
            </div>
          </a>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExampleFade"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExampleFade"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </div>
    <div id="lists">
      <h3 style="padding: 15px">دسته‌بندی‌ها</h3>
      <div id="items">
        <a href="#"
          ><div>
            <img src="./assets/img/dell-logo.svg" alt="" /></div
        ></a>
        <a href="#"
          ><div>
            <img src="./assets/img/hp-logo.svg" alt="" /></div
        ></a>
        <a href=""
          ><div>
            <img src="./assets/img/apple-logo.svg" alt="" /></div
        ></a>
        <a href=""
          ><div>
            <img src="./assets/img/microsoft-logo.svg" alt="" /></div
        ></a>
        <a href=""
          ><div>
            <img src="./assets/img/asus-logo.svg" alt="" /></div
        ></a>
        <a href=""
          ><div>
            <img src="./assets/img/lenovo-logo.svg" alt="" /></div
        ></a>
      </div>
    </div>
  </body>
  <script src="./assets/js/bootstrap.bundle.min.js"></script>
</html>
