<!doctype html>
<html lang="fa-IR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/bootstrap.rtl.min.css" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      @font-face {
        font-family: "main";
        src: url("./assets/fonts/Vazirmatn-SemiBold.woff2") format("woff2");
      }
      @font-face {
        font-family: "bold";
        src: url("./assets/fonts/Vazirmatn-ExtraBold.woff2") format("woff2");
      }

      body {
        font-family: "main";
        direction: rtl;
        background-color: #fff;
      }

      header a {
        text-decoration: none;
        color: #63616a;
      }
      header h2:hover {
        color: #211f25;
        transition: 0.3s;
      }
      header h2 {
        transition: 0.3s;
      }

      header {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 5px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 1px;
      }

      .logo img {
        width: 55px;
      }

      .logo h2 {
        margin: 0;
      }
      .input {
        border: none;
        outline: none;
        border-radius: 15px;
        padding: 0.7em;
        width: 100%;
        background-color: #fff8f8;
        box-shadow: inset 2px 5px 10px rgba(0, 0, 0, 0.1);
        transition: 300ms ease-in-out;
      }

      .input:focus {
        background-color: white;
        transform: scale(1.05);
        box-shadow:
          13px 13px 100px #cbc8c8,
          -13px -13px 100px #ffffff;
      }
      #search {
        margin: 3% 7%;
      }
      #slider {
        margin: 25px 20px;
        border-radius: 24px;
        overflow: hidden;
      }
      #items {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
        justify-items: center;
        align-items: center;
        padding: 15px;
      }
      #items div {
        width: 45px;
        height: 45px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
      }
      #items div:hover {
        transform: scale(1.3);

        background-color: #f7efef;
        transition: 0.3s;
      }

      #items img {
        width: 30px;
        height: 30px;
      }
      #items a {
        text-decoration: none;
        text-align: center;
        color: #63616a;
      }
      #navigator {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 10px;

        display: flex;
        justify-content: space-around;
        align-items: center;

        background: #fff;
        border-radius: 20px;
        padding: 7px 0;

        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      #navigator a {
        text-decoration: none;
        color: #333;
        flex: 1;
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        transition: 0.3s;
      }

      .nav-item:hover {
        transform: translateY(-2px);
      }

      .nav-item img {
        width: 20px;
        height: 20px;
      }

      .nav-item p {
        margin: 0;
        font-size: 11px;
        line-height: 1;
      }

      .Active {
        background: #f3f4f6;
        border-radius: 18px;
        padding: 6px 16px;
      }

      .Active img {
        width: 22px;
        height: 22px;
      }

      .Active p {
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="#" class="logo">
        <img src="./assets/img/main.webp" alt="Logo" />
        <h2 style="font-family: bold; font-size: medium">
          فروشگاه تخصصی لپتاپ گلابی
        </h2>
      </a>
    </header>
    <div id="search">
      <input
        type="text"
        autocomplete="off"
        name="text"
        class="input"
        placeholder="جستجو در محصولات ..."
      />
    </div>
    <div id="slider">
      <div
        id="carouselExampleFade"
        class="carousel slide carousel-fade"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner">
          <a href="#">
            <div class="carousel-item active">
              <img
                src="./assets/img/slider1.webp"
                class="d-block w-100"
                alt="slider"
              />
            </div>
          </a>
          <a href="#">
            <div class="carousel-item">
              <img
                src="./assets/img/slider2.webp"
                class="d-block w-100"
                alt="slider"
              />
            </div>
          </a>
          <a href="#">
            <div class="carousel-item">
              <img
                src="./assets/img/slider3.webp"
                class="d-block w-100"
                alt="slider"
              />
            </div>
          </a>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExampleFade"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
      </div>
    </div>
    <div id="lists">
      <h2 style="padding: 15px; font-size: medium">دسته‌بندی‌ها</h2>
      <div id="items">
        <a href="#"
          ><div>
            <img src="./assets/img/dell-logo.svg" alt="" />
          </div>
          <p style="margin-top: 7px">دل</p>
        </a>

        <a href="#"
          ><div>
            <img src="./assets/img/hp-logo.svg" alt="" />
          </div>
          <p style="margin-top: 7px">اچ‌پی</p>
        </a>
        <a href=""
          ><div>
            <img src="./assets/img/apple-logo.svg" alt="" />
          </div>
          <p style="margin-top: 7px">مک‌بوک</p>
        </a>
        <a href=""
          ><div>
            <img src="./assets/img/microsoft-logo.svg" alt="" />
          </div>
          <p style="margin-top: 7px;font-size: 10px">سرفیس</p>
        </a>

        <a href=""
          ><div>
            <img src="./assets/img/asus-logo.svg" alt="" />
          </div>
          <p style="margin-top: 7px">ایسوس</p>
        </a>
        <a href=""
          ><div>
            <img src="./assets/img/lenovo-logo.svg" alt="" />
          </div>
          <p style="margin-top: 7px">لنوو</p>
        </a>
      </div>
    </div>
    <div id="navigator">
      <a href="#">
        <div class="nav-item">
          <img src="./assets/img/cart.svg" alt="" />
          <p>سبد خرید</p>
        </div>
      </a>

      <a href="#">
        <div class="nav-item Active">
          <img src="./assets/img/house.svg" alt="" />
          <p>خانه</p>
        </div>
      </a>

      <a href="#">
        <div class="nav-item">
          <img src="./assets/img/laptop.svg" alt="" />
          <p>محصولات</p>
        </div>
      </a>
    </div>
  </body>
  <script src="./assets/js/bootstrap.bundle.min.js"></script>
</html>
