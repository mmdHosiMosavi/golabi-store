<!doctype html>
<html lang="fa-IR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فروشگاه تخصصی لپتاپ گلابی</title>
    <link
      rel="shortcut icon"
      href="./assets/img/amazing-icon.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/bootstrap.rtl.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@14.0.1/swiper-bundle.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      @font-face {
        font-family: "main";
        src: url("./assets/fonts/Vazirmatn-SemiBold.woff2") format("woff2");
      }
      @font-face {
        font-family: "bold";
        src: url("./assets/fonts/Vazirmatn-ExtraBold.woff2") format("woff2");
      }

      body {
        font-family: "main";
        direction: rtl;
        background-color: #f5f5f7;
      }

      header a {
        text-decoration: none;
        color: #63616a;
      }
      header h2:hover {
        color: #211f25;
        transition: 0.3s;
      }
      header h2 {
        transition: 0.3s;
      }

      header {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 5px;
      }
      a {
        text-decoration: none;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 1px;
      }

      .logo img {
        width: 55px;
      }

      .logo h2 {
        margin: 0;
      }
      .input {
        border: none;
        outline: none;
        border-radius: 15px;
        padding: 0.7em;
        width: 100%;
        background-color: #fff8f8;
        box-shadow: inset 2px 5px 10px rgba(0, 0, 0, 0.1);
        transition: 300ms ease-in-out;
      }

      .input:focus {
        background-color: white;
        transform: scale(1.05);
        box-shadow:
          13px 13px 100px #cbc8c8,
          -13px -13px 100px #ffffff;
      }
      #search {
        margin: 3% 7%;
      }
      #slider {
        margin: 25px 20px;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        transition: 0.5s;
        grid-area: slider;
      }
      #items {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
        justify-items: center;
        align-items: center;
        padding: 15px;
        width: 100%;
      }
      #items div {
        width: 45px;
        height: 45px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
      }
      #items div:hover {
        transform: scale(1.3);

        background-color: #f7efef;
        transition: 0.3s;
      }
      .list-text {
        margin-top: 15%;
      }

      #items img {
        width: 80%;
        margin: 5%;
      }
      #items a {
        text-decoration: none;
        text-align: center;
        color: #63616a;
        font-size: small;
      }
      #navigator {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 10px;

        display: flex;
        justify-content: space-around;
        align-items: center;

        background: #fff;
        border-radius: 20px;
        padding: 7px 0;

        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        z-index: 999;
      }
      #slider:hover {
        transform: scale(1.005);
      }
      #navigator a {
        text-decoration: none;
        color: #333;
        flex: 1;
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        transition: 0.3s;
      }

      .nav-item:hover {
        transform: translateY(-2px);
      }

      .nav-item img {
        width: 20px;
        height: 20px;
      }

      .nav-item p {
        margin: 0;
        font-size: 11px;
        line-height: 1;
      }

      .Active {
        background: #f3f4f6;
        border-radius: 18px;
        padding: 6px 16px;
      }

      .Active img {
        width: 22px;
        height: 22px;
      }

      .Active p {
        font-size: 11px;
      }
      main {
        background: #9a9999;
        border-radius: 18px;
        width: 94%;
        color: #0d0c0c;
        margin: 20px auto 35px;
        height: 320px;
        overflow: hidden;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
      }
      .swiper {
        width: 100%;
        height: 100%;
        padding: 15px;
      }

      .swiper-slide {
        background-color: #ffffff;
        width: 180px !important;
        overflow: hidden;
        height: 290px;
        border-radius: 5px;
        transition: 0.35s;
      }
      .product {
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        position: relative;
      }
      .product:hover {
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
      }
      .swiper-slide:hover {
        transform: translateY(-4px);
      }

      .first-slider {
        border-top-right-radius: 12px;
        border-bottom-right-radius: 12px;
      }

      .swiper-slide img {
        width: 90%;
        margin: 0 5%;
        transition: 0.35s;
      }
      .swiper-slide:hover img {
        transform: scale(1.05);
      }

      .product-link {
        background-color: #9a9999;
      }
      .swiper-slide img.toman {
        width: 18px;
        height: 18px;
        margin: 0;
        display: inline;
      }
      .swiper-slide img.bag-icon {
        width: 30px;
        height: 30px;
        margin: 0;
      }
      .buton {
        padding: 0;
        display: inline-flex;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
      }
      .buton:hover {
        transform: scale(1.05);
      }

      .price-box {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 15px 10px;
        position: fixed;
        bottom: 5px;
        left: 0;
        right: 0;
      }
      .arrow {
        width: 100px;
        height: 100px;
        display: block;
        margin: 85px 40px;
      }
      .show-all {
        text-align: center;
        margin-top: 25px;
        color: white;
        font-family: "bold";
      }
      .product-name {
        text-align: center;
        margin: 0 5px;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        overflow: hidden;
      }
      .feature-list {
        background-color: #eae8e8;
        margin: 0 7% 20%;
        padding: 10px 0 0;
        border-radius: 18px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
      }
      .features {
        display: flex;
        justify-content: space-around;
        align-items: center;
      }

      .features-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: 0.5s;
        padding: 0 10px;
      }

      .features-item:not(:first-child) {
        border-right: 1px solid #d9d9d9;
      }
      .features-item:hover {
        transform: scale(1.08) translateY(-5px) scaleX(1.1);
      }

      .features-icon {
        width: 38px;
        height: 38px;
        margin-bottom: 10px;
      }
      .features-text {
        font-size: small;
        text-align: center;
      }
      #list-desc {
        margin: 3%;
        font-size: medium;
      }
      @media (max-width: 370px) {
        #items div {
          width: 35px;
          height: 35px;
        }
      }
      @media (min-width: 1000px) {
        .feature-list {
          margin-bottom: 8%;
        }
        #acer {
          grid-area: acer;
        }
        #hp {
          grid-area: hp;
        }
        #lenovo {
          grid-area: lenovo;
        }

        #asus {
          grid-area: asus;
        }
        #surface {
          grid-area: surface;
        }
        #apple {
          grid-area: apple;
        }
      }
      @media (min-width: 1401px) {
        #lists {
          grid-area: list;
          height: 100%;
        }

        #first {
          display: grid;
          grid-template-columns: 350px 1fr;
          grid-template-areas: "list slider";
          margin-bottom: 5%;
        }
        #items {
          height: 100%;
          display: grid;
          grid-template-areas:
            "apple surface"
            "lenovo asus"
            "acer hp";
          gap: 17% 40%;
          margin-right: 10%;
          align-content: start;
        }
        #items div {
          width: 70px;
          height: 70px;
        }

        .list-text {
          margin-top: 10px;
        }
        #list-desc {
          margin-right: 7%;
        }
      }
      @media (min-width: 1000px) and (max-width: 1400px) {
        #lists {
          grid-area: list;
          height: 100%;
        }

        #first {
          display: grid;
          grid-template-columns: 300px 1fr;
          grid-template-areas: "list slider";
          margin-bottom: 5%;
        }
        #items {
          height: 100%;
          display: grid;
          grid-template-areas:
            "apple surface"
            "lenovo asus"
            "acer hp";
          gap: 10% 40%;
          margin-right: 10%;
          align-content: start;
        }
        #items div {
          width: 50px;
          height: 50px;
        }

        .list-text {
          margin-top: 10px;
        }
        #list-desc {
          margin-right: 7%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="#" class="logo">
        <img src="./assets/img/main.webp" alt="Logo" />
        <h2 style="font-family: bold; font-size: medium">
          فروشگاه تخصصی لپتاپ گلابی
        </h2>
      </a>
    </header>
    <div id="search">
      <input
        type="text"
        autocomplete="off"
        name="text"
        class="input"
        placeholder="جستجو در محصولات ..."
      />
    </div>
    <div id="first">
      <div id="slider">
        <div
          id="carouselExampleFade"
          class="carousel slide carousel-fade"
          data-bs-ride="carousel"
        >
          <div class="carousel-inner">
            <a href="#">
              <div class="carousel-item active">
                <img
                  src="./assets/img/slider1.webp"
                  class="d-block w-100"
                  alt="slider"
                />
              </div>
            </a>
            <a href="#">
              <div class="carousel-item">
                <img
                  src="./assets/img/slider2.webp"
                  class="d-block w-100"
                  alt="slider"
                />
              </div>
            </a>
            <a href="#">
              <div class="carousel-item">
                <img
                  src="./assets/img/slider3.webp"
                  class="d-block w-100"
                  alt="slider"
                />
              </div>
            </a>
          </div>
          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleFade"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
        </div>
      </div>
      <div id="lists">
        <h2 id="list-desc">دسته‌بندی‌ها</h2>
        <div id="items">
          <a href="#" id="acer"
            ><div>
              <img src="./assets/img/acer-logo.svg" alt="" />
            </div>
            <p class="list-text">ایسر</p>
          </a>

          <a href="#" id="hp"
            ><div>
              <img src="./assets/img/hp-logo.svg" alt="" />
            </div>
            <p class="list-text">اچ‌پی</p>
          </a>
          <a href="#" id="apple"
            ><div>
              <img src="./assets/img/apple-logo.svg" alt="" />
            </div>
            <p class="list-text">اپل</p>
          </a>
          <a href="#" id="surface"
            ><div>
              <img src="./assets/img/microsoft-logo.svg" alt="" />
            </div>
            <p class="list-text">سرفیس</p>
          </a>

          <a href="#" id="asus"
            ><div>
              <img src="./assets/img/asus-logo.svg" alt="" />
            </div>
            <p class="list-text">ایسوس</p>
          </a>
          <a href="#" id="lenovo"
            ><div>
              <img src="./assets/img/lenovo-logo.svg" alt="" />
            </div>
            <p class="list-text">لنوو</p>
          </a>
        </div>
      </div>
    </div>
    <div id="navigator">
      <a href="#">
        <div class="nav-item">
          <img src="./assets/img/cart.svg" alt="" />
          <p>سبد خرید</p>
        </div>
      </a>

      <a href="#">
        <div class="nav-item Active">
          <img src="./assets/img/house.svg" alt="" />
          <p>خانه</p>
        </div>
      </a>

      <a href="#">
        <div class="nav-item">
          <img src="./assets/img/laptop.svg" alt="" />
          <p>محصولات</p>
        </div>
      </a>
    </div>
    <main>
      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <div style="margin: 0 12px" class="swiper-slide product-link">
            <a href="#">
              <img src="./assets/img/amazing.png" alt="" />
              <img src="./assets/img/amazing-icon.png" alt="" />
              <p class="show-all">مشاهده همه</p>
            </a>
          </div>
        </div>
      </div>
    </main>
    <div class="feature-list">
      <h5 style="text-align: center; margin: 1% 0 3%">اعتماد به ما</h5>
      <div class="features">
        <div class="features-item">
          <img class="features-icon" src="./assets/img/headset.svg" alt="" />
          <p class="features-text">پشتیبانی ۲۴/۷</p>
        </div>
        <div class="features-item">
          <img class="features-icon" src="./assets/img/countdown.svg" alt="" />
          <p class="features-text">۷ روز ضمانت</p>
        </div>
        <div class="features-item">
          <img class="features-icon" src="./assets/img/truck.svg" alt="" />
          <p class="features-text">ارسال سریع</p>
        </div>
        <div class="features-item">
          <img class="features-icon" src="./assets/img/check-tick.svg" alt="" />
          <p class="features-text">ضمانت اصالت</p>
        </div>
      </div>
    </div>
  </body>
  <script src="./assets/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@14.0.1/swiper-bundle.min.js"></script>
  <script>
    let html = "";
    fetch("./data.json")
      .then((res) => res.json())
      .then((products) => {
        const wrapper = document.querySelector(".swiper-wrapper");
        function formatPrice(price) {
          return Number(price).toLocaleString("fa-IR");
        }
        products.slice(12, 20).forEach((product) => {
          html += `

<div class="swiper-slide product">

<img src="${product.img}" alt="">


<strong>
<p class="product-name">
${product.name}
</p>
</strong>


<div style="margin:15px">

<div class="price-box">
  <span class="price">${formatPrice(product.price)} <span><img class="toman" src="./assets/img/toman.svg" alt="" /></span></span>
    


  <button class="btn btn-secondary buton">
    <img class="bag-icon" src="./assets/img/bag-plus.svg" alt="">
  </button>
</div>



</div>

</div>


`;
        });
        html += `

      <div class="swiper-slide">
            <a class="arrow" href="#">
              <img src="./assets/img/arrow-left-circle.svg" alt="" />
              <p class="show-all" style="color: #0d0c0c;">
                مشاهده همه
              </p>
            </a>
          </div>
`;
        wrapper.innerHTML += html;

        new Swiper(".mySwiper", {
          slidesPerView: "auto",
          spaceBetween: 4,
          freeMode: true,
        });
      });
  </script>
</html>
